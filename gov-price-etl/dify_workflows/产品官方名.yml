    - data:
        code: "import json\n\ndef main(llm_output: str) -> dict:\n    try:\n     \
          \   parsed = json.loads(llm_output)\n    except Exception as e:\n      \
          \  return {\"ok\": False, \"results\": f\"JSON parse failed: {e}\"}\n\n\
          \    if not isinstance(parsed, dict) or parsed.get(\"ok\") is not True:\n\
          \        return {\"ok\": False, \"results\": \"top-level ok != true\"}\n\
          \n    results = parsed.get(\"results\", {})\n    if not isinstance(results,\
          \ dict):\n        return {\"ok\": False, \"results\": \"results not a dict\"\
          }\n\n    # 校验每条\n    cleaned = {}\n    for k, v in results.items():\n  \
          \      nb = (v.get(\"normalized_breed\") or \"\").strip()\n        cf =\
          \ v.get(\"confidence\", 0.0)\n        nt = (v.get(\"note\") or \"\").strip()[:40]\n\
          \        if not nb:\n            return {\"ok\": False, \"results\": f\"\
          empty normalized_breed for {k!r}\"}\n        if not (0.0 <= float(cf) <=\
          \ 1.0):\n            return {\"ok\": False, \"results\": f\"bad confidence\
          \ for {k!r}: {cf}\"}\n        cleaned[k] = {\"normalized_breed\": nb, \"\
          confidence\": float(cf), \"note\": nt}\n\n    # 强约束：去重数 < 输入数（合并必须生效）\n\
          \    distinct_out = len(set(v[\"normalized_breed\"] for v in cleaned.values()))\n\
          \    if distinct_out >= len(cleaned):\n        return {\n            \"\
          ok\": False,\n            \"results\": f\"未合并: distinct_out={distinct_out}\
          \ >= inputs={len(cleaned)}，\"\n                       f\"说明 AI 没识别变体，疑似全量\
          \ 1:1 返回\",\n        }\n\n    return {\"ok\": True, \"results\": cleaned}"
        code_language: python3
