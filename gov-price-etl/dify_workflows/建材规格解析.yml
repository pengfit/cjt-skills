    nodes:
    - data:
        desc: 定义工作流输入参数与入参约束（类型、必填、默认值）
        selected: false
        title: 输入参数
        type: start
        variables:
        - label: 规格文本列表（待解析项）
          max_length: 50000
          options: []
          placeholder: '每行格式：[N] 规格: <规格文本> | 产品: <产品提示> | 分类: <分类提示>'
