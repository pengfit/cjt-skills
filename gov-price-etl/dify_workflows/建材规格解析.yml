app:
  description: '建材规格解析 ETL 工作流。


    用途：从建材规格文本（如 2000×1000×10、DN80、C30、Φ25×12m）提取结构化业务属性（diameter / length / width
    / thickness / grade / material 等），并生成可执行的 Python 正则解析规则（pattern + code_block）。


    输入：1~20 条规格文本（按行分隔）

    输出：results 数组（每条规格一个解析对象，含 attr/note/pattern/code_block）、ok/err_msg/raw 可观测字段

    优先级：本地 breed_spec_rules.db 精确匹配 > 本地关键词相似度 > LLM 推理


    适用场景：gov-price-etl 价格入库后的规格归一化与解析规则沉淀。

    维护：scripts/dify_export.py 从 prompts.yml 自动生成（不要手工改本 DSL）。'
  icon: 🔧
  icon_background: '#D1E9FF'
  icon_type: emoji
  mode: workflow
  name: 建材规格解析
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/minimax:0.0.22@defec8126d46e6427574978827f03e8dd0a4db76985f6004e75ec644a69fc060
