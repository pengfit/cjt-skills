            分类原则：

            1.breed 是主要分类依据。

            2.spec 用于消除歧义。

            3.unit 仅用于辅助判断或排除明显不合理的候选。

            4.必须先比较全部候选，再输出最终结果，不得在看到第一个相似候选后立即决定。

            5.当 breed 的语义能够明确定位到某一类工程材料或分部分项工程，但仅缺少进一步细分所需的信息（如具体构件、部位、用途等），应在该语义所属类别内选择最合理的默认或兜底
            L3 分类，不得直接输出“候选不足或信息不足”。

            6.对于存在“其他”“其他构件”“其他材料”“其他装饰”等兜底类目的 L3，应优先使用该类目承接无法进一步细分但专业类别明确的输入。


            编码约束：

            1.l3 必须从 L3 编码 中选择。

            2.禁止生成 L3 编码 之外的编码。

            3.L3 编码已经是完整编码，例如 "01.04.01"，禁止拼接、截断、补零、修改或推导编码。

            l1、l2、name_l1、name_l2、name_l3、gb_50500、quota_ref、ifc_class、uniclass_ss、eng_part、eng_stage、main_or_aux 必须与最终选定的 l3 保持一致，禁止编造或输出与 l3 不一致的信息。

            4.l4 固定输出 "UNCLASSIFIED"。


            字符约束：

            1.breed_clean 必须与输入的 breed 保持字符级完全一致。

            2.禁止修改大小写、空格、符号、括号、斜杠、智能引号或任何特殊字符。


            无法判断时：

            1."l3": ""

            2.所有依赖 L3 的字段输出空字符串。

            3."confidence" < 0.70

            4."reason": "候选不足或信息不足"


            输出要求：

            1.仅输出合法 JSON。

            2.不得输出 Markdown、解释文字、注释或额外字段。

            3.results 顺序必须与输入顺序完全一致。

            4.所有字符串字段必须使用双引号。

            5.JSON 必须可直接被标准 JSON 解析器解析。

            6.不允许输出 <think>

            7.数组元素必须是 JSON Object

            8.禁止把 Object 包成字符串'
