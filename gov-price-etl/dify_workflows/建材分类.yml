    - data:
        code: "import json\nimport re\n\n\ndef _extract_json(text: str) -> str:\n\
          \    \"\"\"健壮提取 JSON 字符串：处理 ```json``` / 前缀说明 / 尾部注释。\"\"\"\n    text =\
          \ (text or \"\").strip()\n    # 抠 ```json ... ``` 块\n    if text.startswith(\"\
          ```\"):\n        parts = text.split(\"```\")\n        if len(parts) >= 3:\n\
          \            text = parts[1]\n            if text.startswith(\"json\"):\n\
          \                text = text[4:]\n    # 找第一个完整 {...} 或 [...] 块（用 stack 计数）\n\
          \    starts = [i for i, c in enumerate(text) if c in \"[{\"]\n    for s\
          \ in starts:\n        opener = text[s]\n        closer = \"}\" if opener\
          \ == \"{\" else \"]\"\n        depth = 0\n        in_str = False\n     \
          \   esc = False\n        for i in range(s, len(text)):\n            c =\
          \ text[i]\n            if esc:\n                esc = False\n          \
          \      continue\n            if c == \"\\\\\":\n                esc = True\n\
          \                continue\n            if c == '\"':\n                in_str\
          \ = not in_str\n                continue\n            if in_str:\n     \
          \           continue\n            if c == opener:\n                depth\
          \ += 1\n            elif c == closer:\n                depth -= 1\n    \
          \            if depth == 0:\n                    return text[s : i + 1]\n\
          \    return text\n\n\ndef main(llm_output):\n    \"\"\"解析 LLM 输出为结构化 dict。\n\
          \n    返回 4 个字段（与 Code 节点 outputs 字典 key 严格对应）：\n      - ok          (bool):\
          \ 解析是否成功\n      - results     (list): 分类/解析结果数组\n      - raw         (str):\
          \  LLM 原始输出（调试用）\n      - err_msg     (str): 错误信息（成功时空字符串）— 不用 error（Dify\
          \ 保留字）\n    \"\"\"\n    out = {\"ok\": False, \"results\": [], \"err_msg\"\
          : \"\"}\n    raw = _extract_json(llm_output or \"\")\n    if not raw:\n\
          \        out[\"err_msg\"] = \"empty LLM output\"\n        return out\n \
          \   try:\n        data = json.loads(raw)\n    except Exception as e:\n \
          \       out[\"err_msg\"] = f\"json.loads failed: {e}\"\n        return out\n\
          \    # 兼容三种顶层结构\n    if isinstance(data, dict) and isinstance(data.get(\"\
          results\"), list):\n        out[\"ok\"] = True\n        out[\"results\"\
          ] = data[\"results\"]\n        return out\n    if isinstance(data, dict)\
          \ and \"suggestions\" in data:\n        # parse_spec 任务：{suggestions: [...]}\
          \ 包一层\n        out[\"ok\"] = True\n        out[\"results\"] = [data]\n \
          \       return out\n    if isinstance(data, list):\n        out[\"ok\"]\
          \ = True\n        out[\"results\"] = data\n        return out\n    out[\"\
          err_msg\"] = f\"unexpected top-level type: {type(data).__name__}\"\n   \
          \ return out"
