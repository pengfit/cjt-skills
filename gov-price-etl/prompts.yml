classify_v2_batch:
  system: |
    你是建筑工程造价专家与 BIM 工程师。
    任务：对每个材料品种（breed + spec + unit），判断它最适合的 v2 4 层分类编码（L1 / L2 / L3 + L4 + name + gb_50500 等）。
  template: |

    关键约束：
    1. L3 字段在数据库里已是完整编码（形如 "01.04.01"，l1.l2.末段 3 段拼接），
        **不是** l1.l2.l3 三段独立字段。**禁止再次拼接**，直接复制即可。
    2. 输出 L3 / L1 / L2 必须严格来自下方全量列表，禁止编造。
    3. L4 暂时为 "UNCLASSIFIED"。
    4. breed_clean 是 breed 的归一化版本（已小写、去符号），但你的输出必须保持
        与输入完全一致（不要做智能引号 / 直引号转换、不要做大小写转换）。

    v2 L3 分类法全量（{total_l3} 个 L3）：见附件 DB（不要在 prompt 中重复，你记住 L1 大类即可：01 建筑/02 装饰/03 安装/04 市政/05 园林/06 安全/07 措施工艺/08 其他）

    ⚠️ 编码格式说明：L3 编码形如 "01.04.01"，是 01 + . + 04 + . + 01 三段拼接。

    （优化：L3 详细列表本轮不发送，让 AI 仅输出 L1 (2位) + L2 (5位) + L3 估计 (8位) + 0.7 置信度；严格以 L1 八大类为准）

    待分类的 {batch_n} 条品种：
    {breed_list}

    每行品种格式：N. breed=<品种名> | spec=<规格> | unit=<单位> | current_l3=<当前 L3 编码>
    其中 current_l3 是 v1→v2 自动翻译的结果（可能过粗或不够准确），也可能为空（新增品种）。

    你的任务：对每条品种输出一个 JSON 对象，按出现顺序排列到 results 数组：
      - "breed_clean": 原品种名（保持完全一致，包括智能引号 "" 等特殊字符）
      - "current_l3": 原 L3 编码（保持完全一致）
      - "l1": L1 编码（2 位字符）
      - "l2": L2 编码（5 位字符，如 "01.04"）
      - "l3": L3 编码（8 位字符，如 "01.04.01"），必须是全量列表中的合法编码
      - "name_l3": L3 中文名（从全量列表反查，禁止编造）
      - "l4": "UNCLASSIFIED"（v2 暂未启用 L4）
      - "name_l1": L1 中文名（从全量列表反查）
      - "name_l2": L2 中文名（从全量列表反查）
      - "gb_50500": GB 50500 工程量清单编码（如 "010601"，无则填空字符串）
      - "quota_ref": 定额引用（如 "1-1" / "5-31"，无则填空字符串）
      - "ifc_class": IFC 国际 BIM 分类（如 "IfcBeam"，无则填空字符串）
      - "uniclass_ss": Uniclass 分类（如 "Ss_20_20_20"，无则填空字符串）
      - "eng_part": 工程部位（"基础" / "主体" / "装饰" / "屋面" / "其他" 之一，无则填空）
      - "eng_stage": 工程阶段（"设计" / "施工" / "运维" 之一，无则填空）
      - "main_or_aux": 主辅材（"主材" / "辅材" 之一，无则填空）
      - "unit": 单位（"m³" / "t" / "m" / "kg" 等，无则填空）
      - "confidence": 0.0-1.0 置信度（>=0.85 高置信度 / 0.70-0.85 中等 / <0.70 低）
      - "reason": 一句话理由（中文，不超过 30 字）

    ⚠️ 字符保留警告：breed_clean 输入时可能含智能引号（"" U+201C/U+201D），
    你必须保持字符完全一致——**不要把智能引号规范成直引号 ""**，否则下游 join 会丢失。

    输出 JSON 结构（严格遵守，不要任何额外说明文字）：
    {{
      "ok": true,
      "results": [
        {{"breed_clean": "...", "current_l3": "...", "l1": "...", "l2": "...", "l3": "...",
          "name_l1": "...", "name_l2": "...", "name_l3": "...", "l4": "UNCLASSIFIED",
          "gb_50500": "...", "quota_ref": "...", "ifc_class": "...", "uniclass_ss": "...",
          "eng_part": "...", "eng_stage": "...", "main_or_aux": "...", "unit": "...",
          "confidence": 0.9, "reason": "..."}},
        ...
      ]
    }}
