fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-

    当前需要为以下规格字符串生成 Python re 解析规则：

    输入规格文本: {spec}

    产品提示:  {breed_hint}

    分类提示: {cat_hint}

    任务目标：
    
        从规格文本中尽可能提取结构化业务属性，并生成可直接使用的 Python 正则解析规则。

    核心原则
      
        1. 属性拆分原则
          - 每个可识别业务属性必须单独 suggestion
          - 相同业务属性仅允许生成一个 suggestion
          - suggestions 数量 = 最终识别出的属性数量
          - 遇到复合型的内容要拆分任何有可能的业务属性（重要）
          - 值相同时禁止并存
            例如：Φ20 Q235 
              正确：{diameter:20mm, material:Q235}
              错误：{diameter:20mm, material:Q235, outer_diameter:20mm, grade:Q235}

        2. 业务属性命名要求

          - 优先使用以下名称:

            {ref_names}

          - 属性名禁止出现中文,驼峰命名格式

          - 无法归类时再创建新属性名称。

          - 正确

              属性名

              例如：

              diameter
              thickness
              rated_load

          - 错误

              diameter 
              outside_diameter 
              pipe_diameter
              attrRated_load

    行业推断优先级

        1. 按以下顺序推断：
        
            产品提示 > 分类提示  > 通用行业规则

        2. 常见行业规则：

            管材: DN80、50×5.6 → diameter, thickness
            钢板: 2000×1000×10 → length, width, thickness
            矩形管: 200×100×6 → height, width, thickness
            H型钢: 200×200×8×12 → height, width, web_thickness, flange_thickness
            工字钢: Q235B 10-16# → material=Q235B, grade=10-16#（号-号范围，#表示I-beam尺寸号）
            电缆: 3×2.5 → core_count, cross_section_area
            螺纹钢: Φ25×12m → diameter, length

    Pattern规则

        1. 一个 Pattern 仅服务一个 attr。

        2. 一个 Pattern 只能存在一个有效捕获组。

        3. 捕获组必须直接返回最终值。

        4. 优先使用业务关键字锚定：
              抗压强度
              容重
              导热系数
              DN
              Φ
              电压
              功率
              频率
              等
 
        5. 仅当不存在业务关键字时，
            才允许按行业维度位置推断。

        6. 多维规格：
            每个属性独立 Pattern。

        7. 数字必须增加边界控制：

            (?<!\\d)
            (?!\\d)

        8. 尺寸分隔符统一兼容：

            [×xX＊*╳]

            多维规格维度定位规则（强制）
              对于：

                A×B
                A×B×C
                A×B×C×D

              每个属性必须通过维度位置定位。

              禁止：

                (?<!\d)(\d+)(?!\d)

              因为无法确定维度。

              正确：

              第1维：
                ^(\d+)[×xX＊*╳]

              第2维：
                ^(?:\d+)[×xX＊*╳](\d+)[×xX＊*╳]

              第3维：
                ^(?:\d+)[×xX＊*╳](?:\d+)[×xX＊*╳](\d+)$

        9. 单位必须与数值一同捕获。

        10. Pattern 不要求必须以 ^ 开头，
            
            但必须存在明确业务锚点或维度结构锚点。

    单位识别规则（重要，必须强制执行）

          核心原则：单位必须与数值一同返回，禁止只返回纯数值。

          1. 原文有单位：必须保留原单位
                示例：
                  DN80mm -> 80mm
                  Φ25cm -> 25cm
                  δ=4.5mm -> 4.5mm
                  50×5.6 -> 50×5.6（单位已在分隔符中体现）

          2. 原文无单位（重要！必须补全）：
                规格中无明确单位标记时，按以下行业默认值补全：

                行业/分类 → 默认单位

                钢材/钢板/型材 → mm（长度、厚度、宽度均用mm）
                管材（无缝管/焊管） → mm（直径、壁厚）
                混凝土/水泥 → 无尺寸单位（仅等级，如C30、P·O 42.5）
                电缆/电线 → mm（截面积 cross_section 用 mm²）
                木材/竹材 → mm（长度、宽度、厚度）
                涂料/油漆 → 无尺寸单位
                阀门/管件 → mm（公称直径）
                保温材料 → mm（厚度）
                防水材料 → mm（厚度）

                示例：
                  "2000×1000×10"（钢板）→ length=2000mm, width=1000mm, thickness=10mm
                  "DN80"（管材）→ diameter=80mm
                  "3×2.5"（电缆）→ cores=3, cross_section=2.5mm²
                  "C30"（混凝土）→ grade=30（无长度单位，属等级标识）
                  "P·O 42.5级"（水泥）→ type=P·O, grade=42.5（无长度单位）

          3. 等级标识与尺寸单位的区分：
                - C30 / C35 / C40 等为强度等级，不是尺寸，单位为"级"或不带单位
                - 42.5级 / 32.5级 为水泥标号，不是尺寸
                - 这类属性用 grade 或 type 捕获，不需要补全长度单位

          4. 单位符号规范：
                mm → mm（毫米）
                cm → cm（厘米）
                m → m（米）
                mm² → mm²（平方毫米，截面积用）
                m² → m²（平方米，面积用）
                m³ → m³（立方米，体积用）
                t → t（吨，重量用）

    Code_block规则

            m = re.search(r'Pattern', s)
            if m:
                result['xxx'] = value + '单位'

            要求：
              - Pattern 与 suggestion.pattern 一致
              - result 保存最终值（含单位）
              - 代码格式必须对齐

            示例：
              m = re.search(r'^DN(\\d+)$', s)
              if m:
                  result['diameter'] = m.group(1) + 'mm'

            示例（多维）：
              m = re.search(r'^(\\d+)×(\\d+)×(\\d+)$', s)
              if m:
                  result['length'] = m.group(1) + 'mm'
                  result['width'] = m.group(2) + 'mm'
                  result['thickness'] = m.group(3) + 'mm'

            示例（等级标识，无单位）：
              m = re.search(r'^C(\\d+)$', s)
              if m:
                  result['grade'] = m.group(1)  # C30 → grade=C30，无单位，属等级标识

    兜底规则

          1. 当规格无法匹配标准属性：
              （diameter、length、width、height、thickness 等） 
               但能够明确表达某种产品业务特征时，优先创建新的业务属性。
          
          2. Pattern 与  Code_block 内容严格区分 
          
          3. 仅当无有效规格内容（重要，必须强制执行）
             attr: natural
             Pattern: 严格匹配
             note: AI 不确定内容
          
          4. 若 suggestions 中存在：
             pattern 完全相同
             则视为错误结果，必须重新生成。   
              

    输出格式

          必须返回纯JSON。

          禁止输出：

              - markdown
              - 解释文字
              - 注释
              - 代码块标记

          固定格式：

              {{
                "ok": true,
                "suggestions": [
                  {{
                    "attr": "xxx",
                    "note": "规则说明",
                    "pattern": "Pattern",
                    "code_block": "Code_block"
                  }}
                ]
              }}

classify_v2_batch:
  system: "你是一名建筑工程造价专家与 BIM 工程师。根据材料品种+规格+单位，输出 4 层 v2 分类（GB 50500 清单项目编码 / IFC 4.3 类）。输出 JSON 结构。"
  template: |-

    任务
      输入材料品种、规格、单位，输出 4 层 v2 分类 + 工程属性 + 标准码 + 物料码。
      用于工程数字化 / ERP / BIM 建模 / 造价库建设。
    
    输入格式
      每行一条材料：
        N. breed=<品种> | spec=<规格> | unit=<单位>
    
    输出字段（每个品种必填 1 行，结构完全相同）
      l1        8 L1 专业大类（01 建筑工程 / 02 装饰工程 / 03 安装-给排水 / 04 安装-电气 / 05 安装-暖通 / 06 安装-智能化 / 07 市政工程 / 08 园林景观）
      l2        31 L2 分部工程（基于 GB 50500 附录）
      l3        50 L3 分项工程
      l4        L4 细目（缺失时填 "UNCLASSIFIED"）
      eng_part  工程部位（基础/主体/装饰/安装/绿化）
      eng_stage 工程阶段（设计/施工/运维，多选用英文逗号分隔）
      main_or_aux  主材/辅材
      gb_50500  GB 50500 清单项目编码（6 位数字字符串）
      quota_ref 消耗量定额参考号（如 "5-31"，无则留空）
      ifc_class IFC 4.3 类名（IfcColumn / IfcPipeSegment / IfcDuctSegment / IfcCableSegment / IfcLightFixture / IfcValve / IfcSlab / IfcBeam / IfcFooting / IfcMember / IfcWall / IfcDoor / IfcCovering / IfcCurtainWall / IfcSpaceHeater / IfcUnitaryEquipment / IfcElectricDistributionPoint / IfcSensor / IfcAlarm / IfcOutlet / IfcSanitaryTerminal / IfcPavement / IfcPlant / IfcFurnishingElement / IfcEarthworksCut / IfcBuildingElementProxy）
      uniclass_ss  Uniclass 2015 编码（如 "Ss_20_20_20"，无则留空）
      material_code 跨城市稳定物料编码（如 "STEEL_HRB400_F20"，自定格式）
      confidence 0-1 置信度（禁止低于 0.70）
      note      简述分类理由
    
    输出 JSON 格式（每个品种 1 条 results 记录）
        {{
          "ok": true,
          "results": {{
            "品种A": {{
              "l1": "03", "l2": "03.01", "l3": "03.01.02", "l4": "UNCLASSIFIED",
              "eng_part": "安装", "eng_stage": "设计,施工,运维", "main_or_aux": "主材",
              "gb_50500": "031002", "quota_ref": "8-25", "ifc_class": "IfcPipeSegment",
              "uniclass_ss": "Ss_20_20_60", "material_code": "PPR_CW_DN25",
              "confidence": 0.92, "note": "塑料给水管，按 PP-R 材质归类"
            }},
            "品种B": {{...}}
          }}
        }}

    要求
      1. results 数量必须与输入数量完全一致
      2. 字段值不能为空（除 quota_ref/uniclass_ss/note 允许空字符串）
      3. confidence 严格 >= 0.70
      4. 仅输出 JSON，无其他文字
    
    以下为待分类材料列表:
       {items}

