<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Outer ring - partial arc representing data aggregation -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(37,99,235,0.15)" stroke-width="24"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#ring)" stroke-width="24" stroke-linecap="round"
    stroke-dasharray="680 420"
    transform="rotate(-90 256 256)"
    filter="url(#glow)"/>

  <!-- Inner chart area -->
  <rect x="136" y="136" width="240" height="240" rx="28" fill="#ffffff" stroke="rgba(37,99,235,0.25)" stroke-width="2"/>

  <!-- Chart bars - rising pattern -->
  <rect x="162" y="304" width="28" height="52" rx="8" fill="url(#bar)" opacity="0.55"/>
  <rect x="202" y="268" width="28" height="88" rx="8" fill="url(#bar)" opacity="0.7"/>
  <rect x="242" y="228" width="28" height="128" rx="8" fill="url(#bar)" opacity="0.85"/>
  <rect x="282" y="180" width="28" height="176" rx="8" fill="#2563eb"/>

  <!-- Trend line with dots -->
  <polyline
    points="148,330 185,294 222,272 259,236 296,198 333,162 370,130"
    fill="none"
    stroke="#2563eb"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Data dots on trend line -->
  <circle cx="148" cy="330" r="9" fill="#2563eb"/>
  <circle cx="185" cy="294" r="9" fill="#2563eb"/>
  <circle cx="222" cy="272" r="9" fill="#2563eb"/>
  <circle cx="259" cy="236" r="9" fill="#2563eb"/>
  <circle cx="296" cy="198" r="9" fill="#2563eb"/>
  <circle cx="333" cy="162" r="9" fill="#2563eb"/>
  <circle cx="370" cy="130" r="14" fill="#2563eb" stroke="#ffffff" stroke-width="5"/>

  <!-- ¥ currency watermark bottom right -->
  <text x="330" y="370" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#2563eb" opacity="0.1">¥</text>
</svg>
