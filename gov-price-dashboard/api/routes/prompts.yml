fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-

    当前需要为以下规格字符串生成 Python re 解析规则：

    原始规格文本: {spec}

    行业提示:
    {breed_hint}

    分类提示:
    {cat_hint}

    任务目标：
    从规格文本中尽可能提取结构化业务属性，并生成可直接使用的 Python 正则解析规则。

    核心原则
    
      1. 一个 suggestion 只对应一个业务属性
        - 不允许一个 regex 同时解析多个属性
        - 每个业务属性单独生成一条 suggestion
        - suggestions 数量必须等于识别出的业务属性数量

      2. 属性拆分原则
        - 每个可识别业务属性必须单独输出
        - pattern 必须包含捕获组
        - 捕获组只提取当前属性对应值
        - 不允许一个 suggestion 同时返回多个属性

      3. 属性唯一原则
        - 一个业务属性只能出现一次
        - 不允许输出同义属性
          例如：
            禁止：
            diameter
            nominal_diameter
            outer_diameter

            仅保留：
              diameter

    标准属性字典

       1. 优先使用以下标准属性名：
          diameter
          thickness
          length
          width
          height
          wall_thickness
          flange_thickness
          web_thickness
          cross_section_area
          core_count
          pressure
          capacity
          power
          voltage
          current
          frequency
          weight

       2. 输出时统一格式：

          attr_属性名

          例如：

          attr_diameter
          attr_thickness

       3. 禁止生成：

          spec_code
          raw_spec
          full_spec
          prefix
          suffix
          code
          identifier
          token
          dn_prefix
          series_code

    行业推断优先级

       1. 按以下顺序推断：
          行业提示 > 分类提示 > 商品名称 > 通用行业规则

       2. 常见行业规则：

            管材：
              DN80
              50×5.6
              DN100×4

              优先：
              diameter
              thickness

            钢板：
              2000×1000×10

              优先：
              length
              width
              thickness

            矩形管：
              200×100×6

              优先：
              height
              width
              thickness

            H型钢：
              200×200×8×12

              优先：
              height
              width
              web_thickness
              flange_thickness

            电缆：
               3×2.5

              优先：
              core_count
              cross_section_area

            螺纹钢：
              Φ25×12m
              优先：
              diameter
              length

    单位识别业务属性规则
       
       1. 当规格为“单数值 + 单位”结构时，优先根据单位推断业务属性。
       
       2. 映射关系如下：
            
            功率：
              W
              kW
              MW
              → power
            电压：
              V
              kV
              → voltage
            电流：
              A
              mA
              → current
            频率：
              Hz
              kHz
              MHz
              → frequency
            重量：
              g
              kg
              t
              → weight
            压力：
              Pa
              kPa
              MPa
              → pressure
            容量：
              mL
              L
              m³
              → capacity
            截面积：
              mm²
              cm²
              m²
              → cross_section_area
            长度类：
              mm
              cm
              m
       
       3. 结合行业语义判断：
            管材：
              → diameter
            板材：
              → thickness
            型材：
              → height / width / thickness
            示例：
              400W → power
              220V → voltage
              16A → current
              50Hz → frequency
              25kg → weight
              0.6MPa → pressure
              200L → capacity
              2.5mm² → cross_section_area

    单位保留与补全规则

        1. 最终写入 result 的值必须保留单位。
            原文有单位：
            必须保留原单位。

            示例：

            DN80mm
            -> 80mm

            Φ25cm
            -> 25cm

            原文无单位：
            按行业默认单位补全。

        2. 默认单位：

            diameter -> mm
            thickness -> mm
            wall_thickness -> mm
            flange_thickness -> mm
            web_thickness -> mm
            length -> mm
            width -> mm
            height -> mm
            cross_section_area -> mm²

        3. 禁止：

            diameter = 50
            thickness = 5.6

        4. 必须：

            diameter = 50mm
            thickness = 5.6mm

    Pattern规则

        1. 使用 Python re。

        2. 必须包含捕获组。

        3. 尽量使用严格匹配：

            ^
            $

        4. 禁止使用宽泛匹配：

            .*
            .+
            .*?
            .+?
            ([\\s\\S]*)
            (.*)

        5. 除 attr_spec 外禁止贪婪匹配。

    Code规则

        1. code_block 必须严格遵循：

            m = re.search(r'正则', s)
            if m:
                result['attr_xxx'] = 最终业务值

            要求：

            1. result 保存最终业务值
            2. 最终业务值必须包含单位
            3. 不允许保存裸数字
            4. 正则与 pattern 保持一致
            5. Python代码可直接执行

         2. 示例：

            m = re.search(r'^DN(\\d+)$', s)
            if m:
                result['attr_diameter'] = m.group(1) + 'mm'

    attr_spec兜底规则

        1. 当无法识别任何行业业务属性时，如果规格文本仍然具有有效业务内容：
            GC-11
            ABC-100
            GKD25
            
            返回：
            attr_spec

            示例：
            pattern:
            ^(GC-11)$

        3. code:

            m = re.search(r'^(GC-11)$', s)
            if m:
                result['attr_spec'] = m.group(1)

        4. 仅当以下情况允许返回空数组：

            - 空字符串
            - 全为空白
            - 无法识别字符
            - 无有效规格内容

    执行流程

          Step1:
          识别行业语义

          Step2:
          识别规格结构

          Step3:
          提取全部业务属性

          Step4:
          去除重复属性

          Step5:
          为每个属性生成独立 regex

          Step6:
          补全单位

          Step7:
          生成 code_block

          Step8:
            校验：
              - pattern 包含捕获组
              - result 保存最终业务值
              - 单位未丢失
              - suggestions 数量等于属性数量

    suggestions数量规则

        识别1个属性：返回1条

        识别2个属性：返回2条

        识别3个属性：返回3条

        依此类推。

        禁止为了凑数量生成冗余属性。

    输出格式

        必须返回纯JSON。

        禁止输出：

            - markdown
            - 解释文字
            - 注释
            - 代码块标记

        固定格式：

            {{
              "ok": true,
              "suggestions": [
                {{
                  "attr": "attr_xxx",
                  "note": "规则说明",
                  "pattern": "正则表达式",
                  "code_block": "Python代码"
                }}
              ]
            }}

        如果无有效内容：

            {{
              "ok": true,
              "suggestions": []
            }}


classify_breed_batch:
  system: "你是一名建筑工程材料分类专家。输入品种均未命中本地知识库,需要依据工程专业知识进行分类。"
  template: |-
    分类目标
      根据品种在工程建设中的实际用途进行分类。
      分类时必须综合考虑:
        - 所属工程系统
        - 实际工程用途
        - 安装位置
        - 配套关系
        - 行业惯例
      禁止仅根据名称关键词分类。         
    分类体系
      1. 钢材金属材料
      2. 水泥胶凝材料
      3. 砂石骨料
      4. 混凝土预制构件
      5. 砌体墙体材料
      6. 保温隔热材料
      7. 防水密封材料
      8. 防火材料
      9. 电气材料
      10. 弱电智能化材料
      11. 消防材料
      12. 暖通材料
      13. 给排水材料
      14. 门窗幕墙制品
      15. 玻璃采光材料
      16. 板材吊顶隔墙材料
      17. 涂料饰面材料
      18. 五金配件
      19. 土工材料
      20. 市政工程材料
      21. 安装辅材
      22. 机械设备
      23. 仪器仪表
      24. 园林绿化
      25. 金属构件
    分类优先级（重要）
      分类时必须按照以下优先级判断:
        所属工程系统 -> 实际工程用途 -> 安装场景 -> 行业惯例 -> 材料属性 -> 名称特征
      禁止仅根据名称中的字词判断分类。  
    工程系统归属规则
      电气系统
        - 电缆,电线,桥架,母线槽,配电箱,开关柜,接线端子
          分类:电气材料  
      弱电智能化系统 
        - 监控设备,门禁设备,综合布线,交换机,服务器,光纤,网络设备
          分类:弱电智能化材料
      消防系统
        - 喷淋系统,消防报警系统,消火栓系统,灭火器
          分类:消防材料
      给排水系统
        - 给水管,排水管,PVC管,PE管,PPR管,阀门,法兰,水表
          分类:给排水材料
      暖通系统
        - 风管,风口,风阀,风机盘管,空调末端,保温风管
          分类:暖通材料       
    材料属性分类规则
      当无法明确归属工程系统时,再依据材料属性分类。
      例如:
        - 钢板,角钢,槽钢,工字钢,钢筋
          分类:钢材金属材料
        - 水泥,灌浆料,砂浆石膏
          分类:水泥胶凝材料
        - 河砂,机制砂,石子,碎石,级配碎石
          分类:砂石骨料
        - 混凝土,预制梁,预制板,检查井预制件
          分类:混凝土预制构件 
    特殊规则（重点）
      - 钢制桥架
        分类:电气材料
        不是:钢材金属材料
        原因:属于电气系统。
      - 钢丝网骨架PE管
        分类:给排水材料
        不是:钢材金属材料
        原因:属于给排水系统。
      - 钢板止水带
        分类:防水密封材料
        不是:钢材金属材料
        原因:主要功能为防水止水。
      - 消火栓箱
        分类:消防材料
        不是:门窗幕墙制品
        原因:属于消防系统。
      - 弱电箱
        分类:弱电智能化材料
        不是:电气材料
        原因:属于弱电系统。
      - 镀锌支吊架
        分类:安装辅材
        原因:主要起固定安装作用。
    置信度标准
      - 1.00:行业归属唯一且无歧义
      - 0.95:用途明确
      - 0.90:用途较明确
      - 0.80:存在一定歧义
      - 禁止低于0.80
    输出格式
        {{
          "ok": true,
          "results": {{
            "品种1": {{"category": "分类名", "confidence": 0.95, "note": ""}},
            "品种2": {{"category": "分类名", "confidence": 0.88, "note": ""}}
          }}
        }}
      要求：
      1. results数量必须与输入数量一致
      2. 输入顺序与输出顺序保持一致
      3. 不得遗漏任何品种
      4. category必须从分类体系中选择
      5. 除JSON外不得输出任何内容
    以下为待分类品种列表:
       {breeds}


