fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-
    当前需要为以下规格字符串生成 re 解析规则:

    原始规格文本:{spec}

    任务目标:
    从规格文本中尽可能多地提取结构化信息,并生成可用的 Python 正则解析规则。

    要求:

    1. 必须采用"多解析策略",至少生成 3~5 条 suggestions
      - 结构拆分解析(多个字段)
      - 单字段解析(关键属性)
      - 宽松匹配解析(容错版本)
    
    2. 每个可识别字段必须尽量单独拆分,而不是合并在一个 regex 中
    
    3. 每个属性至少尝试:
      - 1 条严格匹配 pattern
      - (可选)1 条宽松匹配 pattern
    
    4. 必须覆盖 spec 中所有可识别信息,不允许遗漏明显字段
    
    5. code_block 必须是完整 Python 代码(可直接运行)
    
    6. pattern 必须使用捕获组提取实际值
    
    7. 不允许只输出单一 regex 覆盖所有字段
    
    8. 必须结合 {breed_hint}{cat_hint} 对 {spec} 的数字顺序进行行业语义推断
       例如:
        - 管材类: 常见结构: 管径×壁厚×长度 / DN×壁厚×长度
        - 板材类: 长×宽×厚
        - 型材类: 高×宽×厚
        - 电缆类: 芯数×截面积
    
    9. 当 spec 为纯数字结构时,必须优先推断业务语义属性名
    
    10. 可参考行业 spec 模式,但不局限于以下模式
        - 管材: 管径×壁厚×长度
        - 钢板: 长×宽×厚
        - 矩形管: 长×宽×壁厚
        - 电缆: 芯数×截面积
        - 螺纹钢: 直径×长度
        - H型钢: 高×宽×腹板厚×翼缘厚
    
    11. 必须尽量输出语义化属性名
        参考属性但不局限于:{attr_desc}

    输出格式必须是纯 JSON(不带 markdown 代码块):

    {{
      "ok": true,
      "suggestions": [
        {{
          "attr": "属性名",
          "note": "规则说明",
          "pattern": "正则表达式",
          "code_block": "完整Python代码"
        }}
      ]
    }}


classify_breed_batch:
  system: "你是一名建筑工程物资分类专家。"
  template: |-
    
    任务：根据“工程实际用途”对品种进行分类。
   
    分类体系
        1. 钢材/金属材料
        2. 水泥/砂浆/胶凝材料
        3. 混凝土/预制构件
        4. 砖/砌块/墙体材料
        5. 保温/隔热材料
        6. 防水/密封材料
        7. 防火材料
        8. 管材管件
        9. 电气材料
        10. 机械设备
        11. 消防器材
        12. 门窗/幕墙/金属制品
        13. 玻璃/采光材料
        14. 板材/吊顶/隔墙
        15. 涂料/饰面材料
        16. 五金配件
        17. 土工材料
        18. 市政材料
        19. 智能化/弱电材料
        20. 安装辅材
        21. 设备仪器
        22. 园林绿化

    分类要求：
      1.必须严格优先使用给定的 "分类体系"
      2.不不允许仅按名称关键词分类
      3.必须结合：
        - 实际工程用途
        - 所属工程系统
        - 安装场景
        - 行业常识
        - 综合判断
      4.若分类均不合适，可新增合理分类
      5.每个品种必须独立判断
      6.每个品种必须返回：
        - category
        - confidence
        - note
      7.不允许遗漏任何输入项
      8.results 数量必须与输入数量一致
      9.输入顺序与输出顺序保持一致
      10.禁止返回空分类

    品种列表：
       {breeds}

    请直接返回 JSON（不带 markdown）：

    {{
      "ok": true,
      "results": {{
        "品种1": {{"category": "分类名", "confidence": 0.95, "note": ""}},
        "品种2": {{"category": "分类名", "confidence": 0.88, "note": ""}}
      }}
    }}
