fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-

    当前需要为以下规格字符串生成 Python re 解析规则：

    输入规格文本: {spec}

    产品提示:  {breed_hint}

    分类提示: {cat_hint}

    任务目标：
    
        从规格文本中尽可能提取结构化业务属性，并生成可直接使用的 Python 正则解析规则。

    核心原则
      
        1. 属性拆分原则
          - 每个可识别业务属性必须单独 suggestion
          - 相同业务属性仅允许生成一个 suggestion
          - suggestions 数量 = 最终识别出的属性数量
          - 遇到复合型的内容要拆分任何有可能的业务属性（重要）

        2. 业务属性命名要求

          - 优先使用以下名称:

            {ref_attr_names}

          - 属性名禁止出现中文,驼峰命名格式

          - 无法归类时再创建新属性名称。

          - 正确

              attr_属性名

              例如：

              attr_diameter
              attr_thickness
              attr_rated_load

          - 错误

              diameter 
              outside_diameter 
              pipe_diameter
              attrRated_load

    行业推断优先级

        1. 按以下顺序推断：
        
            产品提示 > 分类提示  > 通用行业规则

        2. 常见行业规则：

            管材: DN80、50×5.6 → diameter, thickness
            钢板: 2000×1000×10 → length, width, thickness
            矩形管: 200×100×6 → height, width, thickness
            H型钢: 200×200×8×12 → height, width, web_thickness, flange_thickness
            电缆: 3×2.5 → core_count, cross_section_area
            螺纹钢: Φ25×12m → diameter, length

    Pattern规则


        1. 一个 Pattern 仅服务一个 attr。

        2. 一个 Pattern 只能存在一个有效捕获组。

        3. 捕获组必须直接返回最终值。

        4. 优先使用业务关键字锚定：
              抗压强度
              容重
              导热系数
              DN
              Φ
              电压
              功率
              频率
              等
 
        5. 仅当不存在业务关键字时，
            才允许按行业维度位置推断。

        6. 多维规格：
            每个属性独立 Pattern。

        7. 数字必须增加边界控制：

            (?<!\\d)
            (?!\\d)

        8. 尺寸分隔符统一兼容：

            [×xX＊*╳]

            多维规格维度定位规则（强制）
              对于：

                A×B
                A×B×C
                A×B×C×D

              每个属性必须通过维度位置定位。

              禁止：

                (?<!\d)(\d+)(?!\d)

              因为无法确定维度。

              正确：

              第1维：
                ^(\d+)[×xX＊*╳]

              第2维：
                ^(?:\d+)[×xX＊*╳](\d+)[×xX＊*╳]

              第3维：
                ^(?:\d+)[×xX＊*╳](?:\d+)[×xX＊*╳](\d+)$

        9. 单位必须与数值一同捕获。

        10. Pattern 不要求必须以 ^ 开头，
            
            但必须存在明确业务锚点或维度结构锚点。

    单位识别规则（重要）
          
          1. 原文有单位：
              必须保留原单位。
                示例： 
                  DN80mm -> 80mm
                  Φ25cm -> 25cm
                  
          2. 原文无单位：
              按行业默认单位补全
          
    Code_block规则

            m = re.search(r'Pattern', s)
            if m:
                result['attr_xxx'] = value + '单位'

            要求：
              - Pattern 与 suggestion.pattern 一致
              - result 保存最终值
            
            示例：
              m = re.search(r'^DN(\\d+)$', s)
              if m:
                  result['attr_diameter'] = m.group(1) + 'mm'
      
    兜底规则

          1. 当规格无法匹配标准属性：
              （diameter、length、width、height、thickness 等） 
               但能够明确表达某种产品业务特征时，优先创建新的业务属性。
          
          2. Pattern 与  Code_block 内容严格区分 
          
          3. 仅当无有效规格内容
             attr: attr_natural
             Pattern: 严格匹配
             note: AI 不确定内容
          
          4. 若 suggestions 中存在：
             pattern 完全相同
             则视为错误结果，必须重新生成。   
              

    输出格式

          必须返回纯JSON。

          禁止输出：

              - markdown
              - 解释文字
              - 注释
              - 代码块标记

          固定格式：

              {{
                "ok": true,
                "suggestions": [
                  {{
                    "attr": "attr_xxx",
                    "note": "规则说明",
                    "pattern": "Pattern",
                    "code_block": "Code_block"
                  }}
                ]
              }}


classify_breed_batch:
  system: "你是一名建筑工程材料分类专家。输入品种均未命中本地知识库,需要依据工程专业知识进行分类。"
  template: |-
    分类目标
      根据品种在工程建设中的实际用途进行分类。
      分类时必须综合考虑:
        - 所属工程系统
        - 实际工程用途
        - 安装位置
        - 配套关系
        - 行业惯例
      禁止仅根据名称关键词分类。         
    分类体系
      1. 钢材金属材料
      2. 水泥胶凝材料
      3. 砂石骨料
      4. 混凝土预制构件
      5. 砌体墙体材料
      6. 保温隔热材料
      7. 防水密封材料
      8. 防火材料
      9. 电气材料
      10. 弱电智能化材料
      11. 消防材料
      12. 暖通材料
      13. 给排水材料
      14. 门窗幕墙制品
      15. 玻璃采光材料
      16. 板材吊顶隔墙材料
      17. 涂料饰面材料
      18. 五金配件
      19. 土工材料
      20. 市政工程材料
      21. 安装辅材
      22. 机械设备
      23. 仪器仪表
      24. 园林绿化
      25. 金属构件
    分类优先级（重要）
      分类时必须按照以下优先级判断:
        所属工程系统 -> 实际工程用途 -> 安装场景 -> 行业惯例 -> 材料属性 -> 名称特征
      禁止仅根据名称中的字词判断分类。  
    工程系统归属规则
      电气系统
        - 电缆,电线,桥架,母线槽,配电箱,开关柜,接线端子
          分类:电气材料  
      弱电智能化系统 
        - 监控设备,门禁设备,综合布线,交换机,服务器,光纤,网络设备
          分类:弱电智能化材料
      消防系统
        - 喷淋系统,消防报警系统,消火栓系统,灭火器
          分类:消防材料
      给排水系统
        - 给水管,排水管,PVC管,PE管,PPR管,阀门,法兰,水表
          分类:给排水材料
      暖通系统
        - 风管,风口,风阀,风机盘管,空调末端,保温风管
          分类:暖通材料       
    材料属性分类规则
      当无法明确归属工程系统时,再依据材料属性分类。
      例如:
        - 钢板,角钢,槽钢,工字钢,钢筋
          分类:钢材金属材料
        - 水泥,灌浆料,砂浆石膏
          分类:水泥胶凝材料
        - 河砂,机制砂,石子,碎石,级配碎石
          分类:砂石骨料
        - 混凝土,预制梁,预制板,检查井预制件
          分类:混凝土预制构件 
    特殊规则（重点）
      - 钢制桥架
        分类:电气材料
        不是:钢材金属材料
        原因:属于电气系统。
      - 钢丝网骨架PE管
        分类:给排水材料
        不是:钢材金属材料
        原因:属于给排水系统。
      - 钢板止水带
        分类:防水密封材料
        不是:钢材金属材料
        原因:主要功能为防水止水。
      - 消火栓箱
        分类:消防材料
        不是:门窗幕墙制品
        原因:属于消防系统。
      - 弱电箱
        分类:弱电智能化材料
        不是:电气材料
        原因:属于弱电系统。
      - 镀锌支吊架
        分类:安装辅材
        原因:主要起固定安装作用。
    置信度标准
      - 1.00:行业归属唯一且无歧义
      - 0.95:用途明确
      - 0.90:用途较明确
      - 0.80:存在一定歧义
      - 禁止低于0.80
    输出格式
        {{
          "ok": true,
          "results": {{
            "品种1": {{"category": "分类名", "confidence": 0.95, "note": ""}},
            "品种2": {{"category": "分类名", "confidence": 0.88, "note": ""}}
          }}
        }}
      要求：
      1. results数量必须与输入数量一致
      2. 输入顺序与输出顺序保持一致
      3. 不得遗漏任何品种
      4. category必须从分类体系中选择
      5. 除JSON外不得输出任何内容
    以下为待分类品种列表:
       {breeds}


