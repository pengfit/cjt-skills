fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-
    当前需要为以下规格字符串生成 re 解析规则:
    原始规格文本:  {spec}
    任务目标: 
    从规格文本中尽可能提取结构化业务属性,并生成可直接使用的 Python 正则解析规则。
    必须严格遵守以下规则:
    1. 采用多解析策略
      - 可生成 1~5 条 suggestions
      - 每条 suggestion 只对应一个独立业务属性
      - 不允许一个 regex 同时解析多个属性
    2. 属性拆分原则
      - 每个可识别业务属性必须单独输出
      - pattern 必须包含捕获组
      - 捕获组只提取该属性实际值
    3. 属性唯一原则
      - 一个业务属性只能出现一次
      - 不允许同义属性重复输出
        例如:
          禁止: diameter,diameter_mm,nominal_diameter
          因为本质均表示同一个属性,只保留:diameter
    4. 最小字段原则
      - 只输出业务有价值的属性
      - 禁止输出辅助属性
      - 禁止生成:spec_code,raw_spec,full_spec,prefix,suffix,code,identifier,token,dn_prefix,series_code
      - 字段本身属于明确业务属性
    5. 单字段规格规则
      - 如果整个规格仅能识别出一个业务属性,suggestions 必须只返回 1 条
        例如:DN80,只能返回:diameter
    6. 业务语义优先原则
      - 优先输出行业业务属性
        例如:
        DN80 
        → diameter
        Φ25 
        → diameter
        3×2.5 
        → core_count
        → cross_section_area
        2000×1000×10
        → length
        → width
        → thickness
      - 禁止为了凑数量生成非业务属性
    7. 行业语义推断
       {breed_hint}
       {cat_hint}
       以及行业常见规格模式进行推断
       例如:
        - 管材: 管径×壁厚×长度,DN×壁厚×长度
        - 钢板: 长×宽×厚
        - 矩形管: 高×宽×厚
        - H型钢: 高×宽×腹板厚×翼缘厚
        - 电缆: 芯数×截面积
        - 螺纹钢: 直径×长度
        - 型材: 高×宽×厚
    8. 纯数字规格推断
       - 对于纯数字结构:必须优先推断业务属性名
         例如:200×100×6 
         优先:
         height
         width
         thickness
    9. 属性覆盖原则
        - 必须覆盖所有可识别业务属性
        - 但不得为了增加 suggestions 数量而生成重复语义属性
    10. Pattern 要求
        - 使用 Python re 正则
        - 必须包含捕获组
        - 尽量严格匹配
        - 不允许宽泛 .* 贪婪匹配
    11. code_block 格式必须严格如下
          m = re.search(r'^属性正则', s)
          if m:
            result['前缀_属性名'] = m.group(0)+ '单位'
        示例:
          m = re.search(r'^DN(\d+)', s)
          if m:
            result['attr_diameter'] = m.group(0) + 'mm'
    12. suggestions 数量规则
        - 如果识别属性数量为:
          0个属性:返回空数组
          1个属性:返回1条
          2个属性:返回2条
          3个属性:返回3条
          依此类推
        - 禁止生成冗余属性补足数量
    13. 特殊规则（重点）
        - 规格:通用,综合
          属性名:attr_spec
    14. 输出格式必须是纯 
        - 必须返回纯 JSON
        - 禁止输出:markdown,解释文字,注释,代码块标记
        - 格式如下
          {{
            "ok": true,
            "suggestions": [
              {{
                "attr": "attr_属性名",
                "note": "规则说明",
                "pattern": "正则表达式",
                "code_block": "代码"
              }}
            ]
          }}


classify_breed_batch:
  system: "你是一名建筑工程材料分类专家。输入品种均未命中本地知识库,需要依据工程专业知识进行分类。"
  template: |-
    分类目标
      根据品种在工程建设中的实际用途进行分类。
      分类时必须综合考虑:
        - 所属工程系统
        - 实际工程用途
        - 安装位置
        - 配套关系
        - 行业惯例
      禁止仅根据名称关键词分类。         
    分类体系
      1. 钢材金属材料
      2. 水泥胶凝材料
      3. 砂石骨料
      4. 混凝土预制构件
      5. 砌体墙体材料
      6. 保温隔热材料
      7. 防水密封材料
      8. 防火材料
      9. 电气材料
      10. 弱电智能化材料
      11. 消防材料
      12. 暖通材料
      13. 给排水材料
      14. 门窗幕墙制品
      15. 玻璃采光材料
      16. 板材吊顶隔墙材料
      17. 涂料饰面材料
      18. 五金配件
      19. 土工材料
      20. 市政工程材料
      21. 安装辅材
      22. 机械设备
      23. 仪器仪表
      24. 园林绿化
      25. 金属构件
    分类优先级（重要）
      分类时必须按照以下优先级判断:
        所属工程系统 -> 实际工程用途 -> 安装场景 -> 行业惯例 -> 材料属性 -> 名称特征
      禁止仅根据名称中的字词判断分类。  
    工程系统归属规则
      电气系统
        - 电缆,电线,桥架,母线槽,配电箱,开关柜,接线端子
          分类:电气材料  
      弱电智能化系统 
        - 监控设备,门禁设备,综合布线,交换机,服务器,光纤,网络设备
          分类:弱电智能化材料
      消防系统
        - 喷淋系统,消防报警系统,消火栓系统,灭火器
          分类:消防材料
      给排水系统
        - 给水管,排水管,PVC管,PE管,PPR管,阀门,法兰,水表
          分类:给排水材料
      暖通系统
        - 风管,风口,风阀,风机盘管,空调末端,保温风管
          分类:暖通材料       
    材料属性分类规则
      当无法明确归属工程系统时,再依据材料属性分类。
      例如:
        - 钢板,角钢,槽钢,工字钢,钢筋
          分类:钢材金属材料
        - 水泥,灌浆料,砂浆石膏
          分类:水泥胶凝材料
        - 河砂,机制砂,石子,碎石,级配碎石
          分类:砂石骨料
        - 混凝土,预制梁,预制板,检查井预制件
          分类:混凝土预制构件 
    特殊规则（重点）
      - 钢制桥架
        分类:电气材料
        不是:钢材金属材料
        原因:属于电气系统。
      - 钢丝网骨架PE管
        分类:给排水材料
        不是:钢材金属材料
        原因:属于给排水系统。
      - 钢板止水带
        分类:防水密封材料
        不是:钢材金属材料
        原因:主要功能为防水止水。
      - 消火栓箱
        分类:消防材料
        不是:门窗幕墙制品
        原因:属于消防系统。
      - 弱电箱
        分类:弱电智能化材料
        不是:电气材料
        原因:属于弱电系统。
      - 镀锌支吊架
        分类:安装辅材
        原因:主要起固定安装作用。
    置信度标准
      - 1.00:行业归属唯一且无歧义
      - 0.95:用途明确
      - 0.90:用途较明确
      - 0.80:存在一定歧义
      - 禁止低于0.80
    输出格式
        {{
          "ok": true,
          "results": {{
            "品种1": {{"category": "分类名", "confidence": 0.95, "note": ""}},
            "品种2": {{"category": "分类名", "confidence": 0.88, "note": ""}}
          }}
        }}
      要求：
      1. results数量必须与输入数量一致
      2. 输入顺序与输出顺序保持一致
      3. 不得遗漏任何品种
      4. category必须从分类体系中选择
      5. 除JSON外不得输出任何内容
    以下为待分类品种列表:
       {breeds}


