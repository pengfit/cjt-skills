fix_case:
  system: '你是一个建材规格解析规则生成专家。'
  template: |-
    当前需要为以下规格字符串生成 re 解析规则:

    原始规格文本:  {spec}

    任务目标: 
    从规格文本中尽可能提取结构化业务属性，并生成可直接使用的 Python 正则解析规则。

    必须严格遵守以下规则：

    1. 采用多解析策略
      - 可生成 1~5 条 suggestions
      - 每条 suggestion 只对应一个独立业务属性
      - 不允许一个 regex 同时解析多个属性
    2. 属性拆分原则
      - 每个可识别业务属性必须单独输出
      - pattern 必须包含捕获组
      - 捕获组只提取该属性实际值
    3. 属性唯一原则
      - 一个业务属性只能出现一次
      - 不允许同义属性重复输出
        例如：
          禁止： diameter，diameter_mm，nominal_diameter
          因为本质均表示同一个属性，只保留：diameter

    4. 最小字段原则
      - 只输出业务有价值的属性
      - 禁止输出辅助属性
      - 禁止生成：spec_code，raw_spec，full_spec，prefix，suffix，code，identifier，token，dn_prefix，series_code
      - 字段本身属于明确业务属性

    5. 单字段规格规则
      - 如果整个规格仅能识别出一个业务属性，suggestions 必须只返回 1 条
        例如：DN80，只能返回：diameter

    6. 业务语义优先原则
      - 优先输出行业业务属性
        例如：
        DN80 
        → diameter
        Φ25 
        → diameter
        3×2.5 
        → core_count
        → cross_section_area
        2000×1000×10
        → length
        → width
        → thickness
      - 禁止为了凑数量生成非业务属性

    7. 行业语义推断
       {breed_hint}
       {cat_hint}
       以及行业常见规格模式进行推断
       例如:
        - 管材: 管径×壁厚×长度，DN×壁厚×长度
        - 钢板: 长×宽×厚
        - 矩形管: 高×宽×厚
        - H型钢: 高×宽×腹板厚×翼缘厚
        - 电缆: 芯数×截面积
        - 螺纹钢: 直径×长度
        - 型材: 高×宽×厚
    
    8. 纯数字规格推断
       - 对于纯数字结构：必须优先推断业务属性名
         例如：200×100×6 
         优先：
         height
         width
         thickness
    9. 属性覆盖原则
        - 必须覆盖所有可识别业务属性
        - 但不得为了增加 suggestions 数量而生成重复语义属性

    10. Pattern 要求
        - 使用 Python re 正则
        - 必须包含捕获组
        - 尽量严格匹配
        - 不允许宽泛 .* 贪婪匹配

    11. code_block 格式必须严格如下

        m = re.match(r'^属性正则', s)
        if m:
          result['属性名'] = m.group(1)
        示例：
        
        m = re.match(r'^DN(\d+)', s)
        if m:
          result['diameter'] = m.group(1)

    12. suggestions 数量规则
        - 如果识别属性数量为：
          0个属性：返回空数组
          1个属性：返回1条
          2个属性：返回2条
          3个属性：返回3条
          依此类推
        - 禁止生成冗余属性补足数量

    13. 输出格式必须是纯 
        - 必须返回纯 JSON
        - 禁止输出：markdown，解释文字，注释，代码块标记
        - 格式如下
          {{
            "ok": true,
            "suggestions": [
              {{
                "attr": "属性名",
                "note": "规则说明",
                "pattern": "正则表达式",
                "code_block": "代码"
              }}
            ]
          }}


classify_breed_batch:
  system: "你是一名建筑工程物资分类专家。"
  template: |-
    
    任务：根据“工程实际用途”对品种进行分类。
   
    分类体系
        1. 钢材/金属材料
        2. 水泥/砂浆/胶凝材料
        3. 混凝土/预制构件
        4. 砖/砌块/墙体材料
        5. 保温/隔热材料
        6. 防水/密封材料
        7. 防火材料
        8. 管材管件
        9. 电气材料
        10. 机械设备
        11. 消防器材
        12. 门窗/幕墙/金属制品
        13. 玻璃/采光材料
        14. 板材/吊顶/隔墙
        15. 涂料/饰面材料
        16. 五金配件
        17. 土工材料
        18. 市政材料
        19. 智能化/弱电材料
        20. 安装辅材
        21. 设备仪器
        22. 园林绿化

    分类要求：
      1.必须严格优先使用给定的 "分类体系"
      2.不不允许仅按名称关键词分类
      3.必须结合：
        - 实际工程用途
        - 所属工程系统
        - 安装场景
        - 行业常识
        - 综合判断
      4.若分类均不合适，可新增合理分类
      5.每个品种必须独立判断
      6.每个品种必须返回：
        - category
        - confidence
        - note
      7.不允许遗漏任何输入项
      8.results 数量必须与输入数量一致
      9.输入顺序与输出顺序保持一致
      10.禁止返回空分类

    品种列表：
       {breeds}

    请直接返回 JSON（不带 markdown）：

    {{
      "ok": true,
      "results": {{
        "品种1": {{"category": "分类名", "confidence": 0.95, "note": ""}},
        "品种2": {{"category": "分类名", "confidence": 0.88, "note": ""}}
      }}
    }}
