fix_case:
  system: 你是一个建材规格解析规则生成专家。
  template: "当前需要为以下规格字符串生成 re 解析规则:\n\n原始规格文本:{spec}\n\n任务目标:\n从规格文本中尽可能多地提取结构化信息,并生成可用的\
    \ Python 正则解析规则。\n\n要求:\n\n1. 必须采用\"多解析策略\",至少生成 3~5 条 suggestions\n  - 结构拆分解析(多个字段)\n\
    \  - 单字段解析(关键属性)\n  - 宽松匹配解析(容错版本)\n\n2. 每个可识别字段必须尽量单独拆分,而不是合并在一个 regex 中\n\n\
    3. 每个属性至少尝试:\n  - 1 条严格匹配 pattern\n  - (可选)1 条宽松匹配 pattern\n\n4. 必须覆盖 spec 中所有可识别信息,不允许遗漏明显字段\n\
    \n5. code_block 必须是完整 Python 代码(可直接运行)\n\n6. pattern 必须使用捕获组提取实际值\n\n7. 不允许只输出单一\
    \ regex 覆盖所有字段\n\n8. 必须结合 {breed_hint}{cat_hint}\n   对 {spec} 的数字顺序进行行业语义推断\n\n\
    \   例如:\n    - 管材类:\n      常见结构:\n        管径×壁厚×长度\n        DN×壁厚×长度\n    - 板材类:\n\
    \        长×宽×厚\n    - 型材类:\n        高×宽×厚\n    - 电缆类:\n        芯数×截面积\n\n9. 当\
    \ spec 为纯数字结构时\n    - 必须优先推断业务语义属性名\n\n10. 可参考行业 spec 模式,但不局限于以下模式\n    - 管材\n\
    \      管径×壁厚×长度\n    - 钢板\n      长×宽×厚\n    - 矩形管\n      长×宽×壁厚\n    - 电缆\n  \
    \    芯数×截面积\n    - 螺纹钢\n      直径×长度\n    - H型钢\n      高×宽×腹板厚×翼缘厚\n\n 11.必须尽量输出语义化属性名\n\
    \n    参考属性但不局限于:{attr_desc}\n\n输出格式必须是纯 JSON(不带 markdown 代码块):\n\n{{\n  \"ok\"\
    : true,\n  \"suggestions\": [\n    {{\n      \"attr\": \"属性名\",\n      \"note\"\
    : \"规则说明\",\n      \"pattern\": \"正则表达式\",\n      \"code_block\": \"完整Python代码\"\
    \n    }}\n  ]\n}}\n"
classify_breed_batch:
  system: |-
    你是一个建材品种分类专家。分类必须严格遵循给定的21个分类体系，不得自行发明新分类。
  template: |-
    你是一个建材品种分类专家。分类必须严格遵循下面的21个分类，不得擅自创建新分类。

    分类体系：

    1. 钢材/金属材料 — 各种建筑钢材及金属材料
       H型钢、工字钢、槽钢、角钢、钢板、钢筋、圆钢、镀锌钢材等

    2. 水泥/砂浆/胶凝材料
       普通水泥、矿渣水泥、特种水泥、干混砂浆、自流平等

    3. 混凝土/预制构件
       预拌混凝土、预制管桩、PC构件、混凝土砖、检查井等

    4. 砖/砌块/墙体材料
       灰砂砖、多孔砖、加气块、砌块等

    5. 保温/隔热材料
       岩棉、玻璃棉、挤塑板、橡塑、硅酸铝等

    6. 防水/密封材料
       SBS卷材、TPO、防水涂料、自粘卷材、密封胶、止水带等

    7. 防火材料
       防火涂料、防火板、阻火圈、防火封堵材料等

    8. 管材管件
       PE/PPR/PVC管、镀锌管、法兰、弯头、三通、沟槽件等

    9. 电气材料
       电线电缆、桥架、配电箱、开关、仪表、自控元件等

    10. 机械设备
        风机、风阀、空调设备、水泵、新风设备、冷却塔等

    11. 消防器材
        喷淋、消火栓、报警设备、灭火器、消防风机等

    12. 门窗/幕墙/金属制品
        铝合金门窗、防火门、栏杆、百叶、雨棚、不锈钢制品等

    13. 玻璃/采光材料
        钢化玻璃、中空玻璃、夹胶玻璃、采光板等

    14. 板材/吊顶/隔墙
        石膏板、硅酸钙板、ALC板、隔断系统、吊顶系统等

    15. 涂料/饰面材料
        乳胶漆、氟碳漆、真石漆、瓷砖、石材饰面等

    16. 五金配件
        合页、锁具、螺栓、支吊架、紧固件等

    17. 土工材料
        土工布、土工膜、土工格栅、排水板、生态袋等

    18. 市政材料
        井盖、雨水篦子、路缘石、检查井、沥青混凝土、市政护栏等

    19. 智能化/弱电材料
        网线、光纤、监控设备、门禁、综合布线等

    20. 安装辅材
        胶水、泡沫剂、扎带、焊条、垫片、辅料等

    21. 设备仪器
        检测仪器、传感器、计量设备、实验设备等

    请从以上21个分类中选择一个，不得自行发明新分类。品种名称不在示例中时，根据其工程用途归入最接近的分类。

    品种列表：
    {breeds}

    请直接返回 JSON（不带 markdown）：

    {
      "ok": true,
      "results": {
        "品种1": {"category": "分类名", "confidence": 0.95, "note": ""},
        "品种2": {"category": "分类名", "confidence": 0.88, "note": ""}
      }
    }
